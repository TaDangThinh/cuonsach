<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sách Lật Trang - Có Tiến Trình Upload</title>
    <script src="libs/pdf.min.js"></script>
    <script src="libs/qrcode.min.js"></script>
    <script src="libs/crypto-js.min.js"></script>
    <style>
        :root { --page-w: 500px; --page-h: 700px; --accent: #3498db; }
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .controls { margin-bottom: 20px; z-index: 1000; background: #333; padding: 15px 25px; border-radius: 50px; display: flex; gap: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); align-items: center; }
        .btn { padding: 10px 20px; cursor: pointer; background: var(--accent); border: none; color: white; border-radius: 20px; font-weight: bold; }
        
        /* Progress Bar */
        #loader-container { display: none; width: 300px; text-align: center; margin: 20px; }
        .progress-bg { width: 100%; height: 10px; background: #444; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }

        #book { position: relative; width: calc(var(--page-w) * 2); height: var(--page-h); perspective: 2500px; display: none; margin: 20px auto; cursor: grab; }
        .paper { position: absolute; width: var(--page-w); height: 100%; top: 0; right: 0; transform-origin: left center; transition: transform 0.6s ease; transform-style: preserve-3d; }
        .front, .back { position: absolute; width: 100%; height: 100%; top: 0; left: 0; backface-visibility: hidden; background: white; overflow: hidden; border: 1px solid #ccc; }
        .back { transform: rotateY(180deg); }
        .paper.flipped { transform: rotateY(-180deg); }
        
        #magnifier { position: fixed; width: 400px; height: 400px; border: 5px solid #f1c40f; border-radius: 50%; pointer-events: none; display: none; z-index: 99999; box-shadow: 0 0 30px rgba(0,0,0,0.8); background: white; overflow: hidden; }
        #mag-canvas { position: absolute; top: 0; left: 0; }
        #qr-section { background: white; padding: 20px; border-radius: 15px; display: none; color: black; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="file" id="pdf-input" accept=".pdf" style="display:none">
        <button class="btn" onclick="document.getElementById('pdf-input').click()">📁 Chọn file & Tải lên</button>
        <button class="btn" onclick="prevPage()">⬅️</button>
        <button class="btn" onclick="nextPage()">➡️</button>
        <button class="btn" id="mag-toggle" onclick="toggleMagnifier()">🔍 Kính lúp (Z)</button>
    </div>

    <!-- Thanh tiến trình -->
    <div id="loader-container">
        <span id="loader-text">Đang chuẩn bị...</span>
        <div class="progress-bg"><div id="progress-bar"></div></div>
    </div>

    <div id="book" onclick="handleBookClick(event)"></div>
    <div id="magnifier"><canvas id="mag-canvas" width="400" height="400"></canvas></div>
    <div id="qr-section"><div id="qrcode" style="display: flex; justify-content: center;"></div><p>QUÉT ĐỂ XEM</p></div>

<script>
    let pdfDoc = null, currPaperIdx = 0, magEnabled = false;
    const book = document.getElementById('book'), magnifier = document.getElementById('magnifier');
    const progressBar = document.getElementById('progress-bar'), loaderText = document.getElementById('loader-text'), loaderContainer = document.getElementById('loader-container');
    
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'libs/pdf.worker.min.js';

    document.getElementById('pdf-input').addEventListener('change', async (e) => {
        const file = e.target.files[0]; if (!file) return;
        
        loaderContainer.style.display = 'block';
        book.style.display = 'none';
        updateProgress(10, "Đang mã hóa bảo mật...");

        const reader = new FileReader();
        reader.onload = async function() {
            const secretKey = CryptoJS.lib.WordArray.random(16).toString();
            const encrypted = CryptoJS.AES.encrypt(reader.result, secretKey).toString();
            
            updateProgress(30, "Đang tải lên Cloud...");
            try {
                const formData = new FormData();
                formData.append('text', encrypted);
                const res = await fetch('https://file.io', { method: 'POST', body: formData });
                const result = await res.json();
                
                if (result.success) {
                    updateProgress(60, "Đang render trang sách...");
                    const shareURL = `${window.location.origin}${window.location.pathname}?id=${result.key}&k=${secretKey}`;
                    showQR(shareURL);
                    await renderFullBook(reader.result);
                }
            } catch (err) { alert("Lỗi tải Cloud!"); loaderContainer.style.display = 'none'; }
        };
        reader.readAsDataURL(file);
    });

    async function renderFullBook(data) {
        pdfDoc = await pdfjsLib.getDocument(data).promise;
        book.innerHTML = ''; currPaperIdx = 0;
        const total = pdfDoc.numPages;

        for (let i = 1; i <= total; i += 2) {
            const paper = document.createElement('div');
            paper.className = 'paper'; paper.style.zIndex = total - i;
            paper.innerHTML = `<div class="front"></div><div class="back"></div>`;
            paper.querySelector('.front').appendChild(await renderPage(i));
            if (i + 1 <= total) paper.querySelector('.back').appendChild(await renderPage(i + 1));
            book.appendChild(paper);
            
            // Cập nhật tiến trình render
            let p = 60 + Math.round((i / total) * 40);
            updateProgress(p, `Đang xử lý trang ${i}/${total}...`);
        }
        
        updateProgress(100, "Hoàn tất!");
        setTimeout(() => { loaderContainer.style.display = 'none'; book.style.display = 'block'; }, 500);
    }

    function updateProgress(percent, text) {
        progressBar.style.width = percent + '%';
        loaderText.innerText = text;
    }

    // Các hàm render trang, kính lúp, lật trang giữ nguyên như cũ...
    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const canvas = document.createElement('canvas');
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: page.getViewport({ scale: 2 }) }).promise;
        return canvas;
    }

    function showQR(url) {
        document.getElementById('qr-section').style.display = 'block';
        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById("qrcode"), { text: url, width: 150, height: 150 });
    }

    function toggleMagnifier() { magEnabled = !magEnabled; document.getElementById('mag-toggle').classList.toggle('active', magEnabled); if (!magEnabled) magnifier.style.display = "none"; }
    function nextPage() { const p = document.querySelectorAll('.paper'); if (currPaperIdx < p.length) { p[currPaperIdx].classList.add('flipped'); p[currPaperIdx].style.zIndex = currPaperIdx + 1; currPaperIdx++; } }
    function prevPage() { const p = document.querySelectorAll('.paper'); if (currPaperIdx > 0) { currPaperIdx--; p[currPaperIdx].classList.remove('flipped'); p[currPaperIdx].style.zIndex = p.length - currPaperIdx; } }
    function handleBookClick(e) { const r = book.getBoundingClientRect(); if ((e.clientX - r.left) > r.width / 2) nextPage(); else prevPage(); }
</script>
</body>
</html>
