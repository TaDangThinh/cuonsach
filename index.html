<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sách Lật Trang - Chia sẻ Cộng đồng</title>
    <script src="libs/pdf.min.js"></script>
    <script src="libs/qrcode.min.js"></script>
    <script src="libs/crypto-js.min.js"></script>
    <style>
        :root { --page-w: 500px; --page-h: 700px; --accent: #3498db; }
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { margin-bottom: 20px; background: #333; padding: 15px 25px; border-radius: 50px; display: flex; gap: 15px; }
        .btn { padding: 10px 20px; cursor: pointer; background: var(--accent); border: none; color: white; border-radius: 20px; font-weight: bold; }
        #book { position: relative; width: calc(var(--page-w) * 2); height: var(--page-h); perspective: 2500px; display: none; margin: 20px auto; }
        .paper { position: absolute; width: var(--page-w); height: 100%; top: 0; right: 0; transform-origin: left center; transition: transform 0.6s ease; transform-style: preserve-3d; }
        .front, .back { position: absolute; width: 100%; height: 100%; top: 0; left: 0; backface-visibility: hidden; background: white; border: 1px solid #ccc; }
        .back { transform: rotateY(180deg); }
        .paper.flipped { transform: rotateY(-180deg); }
        #qr-section { background: white; padding: 20px; border-radius: 15px; display: none; color: black; text-align: center; margin-top: 20px; }
        #loader { display: none; color: #f1c40f; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="controls">
        <input type="file" id="pdf-input" accept=".pdf" style="display:none">
        <button class="btn" onclick="document.getElementById('pdf-input').click()">📁 Tải lên & Tạo QR</button>
        <button class="btn" onclick="prevPage()">⬅️</button>
        <button class="btn" onclick="nextPage()">➡️</button>
    </div>
    <div id="loader">Đang bảo mật dữ liệu...</div>
    <div id="book" onclick="handleBookClick(event)"></div>
    <div id="qr-section"><div id="qrcode" style="display:flex;justify-content:center"></div><p>QUÉT ĐỂ XEM TÀI LIỆU</p></div>

<script>
    let pdfDoc = null, currPaperIdx = 0;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'libs/pdf.worker.min.js';

    // 1. TỰ ĐỘNG LOAD KHI CÓ ID TRÊN LINK
    window.onload = async () => {
        const params = new URLSearchParams(window.location.search);
        const fileId = params.get('id'), k = params.get('k');
        if (fileId && k) {
            document.getElementById('loader').style.display = 'block';
            try {
                const res = await fetch(`https://file.io{fileId}`);
                const data = await res.json();
                const decrypted = CryptoJS.AES.decrypt(data.text, k).toString(CryptoJS.enc.Utf8);
                renderFullBook(decrypted);
            } catch (e) { alert("Tài liệu đã hết hạn hoặc không tồn tại!"); }
            document.getElementById('loader').style.display = 'none';
        }
    };

    // 2. XỬ LÝ UPLOAD (KHÔNG CẦN TOKEN)
    document.getElementById('pdf-input').addEventListener('change', async (e) => {
        const file = e.target.files; if (!file) return;
        const reader = new FileReader();
        reader.onload = async function() {
            document.getElementById('loader').style.display = 'block';
            const secretKey = CryptoJS.lib.WordArray.random(16).toString();
            const encrypted = CryptoJS.AES.encrypt(reader.result, secretKey).toString();

            try {
                const formData = new FormData();
                formData.append('text', encrypted);

                const res = await fetch('https://file.io', {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                
                if (result.success) {
                    const shareURL = `${window.location.origin}${window.location.pathname}?id=${result.key}&k=${secretKey}`;
                    showQR(shareURL);
                    renderFullBook(reader.result);
                }
            } catch (err) { alert("Lỗi lưu trữ Cloud!"); }
            document.getElementById('loader').style.display = 'none';
        };
        reader.readAsDataURL(file);
    });

    // --- Các hàm render giữ nguyên để đảm bảo mượt ---
    async function renderFullBook(data) {
        pdfDoc = await pdfjsLib.getDocument(data).promise;
        const book = document.getElementById('book'); book.innerHTML = ''; book.style.display = 'block';
        for (let i = 1; i <= pdfDoc.numPages; i += 2) {
            const paper = document.createElement('div');
            paper.className = 'paper'; paper.style.zIndex = pdfDoc.numPages - i;
            paper.innerHTML = `<div class="front"></div><div class="back"></div>`;
            paper.querySelector('.front').appendChild(await renderPage(i));
            if (i + 1 <= pdfDoc.numPages) paper.querySelector('.back').appendChild(await renderPage(i + 1));
            book.appendChild(paper);
        }
    }
    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const canvas = document.createElement('canvas');
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: page.getViewport({ scale: 1.5 }) }).promise;
        return canvas;
    }
    function showQR(url) {
        document.getElementById('qr-section').style.display = 'block';
        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById("qrcode"), { text: url, width: 150, height: 150 });
    }
    function nextPage() { const p = document.querySelectorAll('.paper'); if (currPaperIdx < p.length) { p[currPaperIdx].classList.add('flipped'); p[currPaperIdx].style.zIndex = currPaperIdx + 1; currPaperIdx++; } }
    function prevPage() { const p = document.querySelectorAll('.paper'); if (currPaperIdx > 0) { currPaperIdx--; p[currPaperIdx].classList.remove('flipped'); p[currPaperIdx].style.zIndex = p.length - currPaperIdx; } }
    function handleBookClick(e) { const r = book.getBoundingClientRect(); if ((e.clientX - r.left) > r.width / 2) nextPage(); else prevPage(); }
</script>
</body>
</html>
