<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuonsach - Cloud Upload Pro</title>
    <script src="libs/pdf.min.js"></script>
    <script src="libs/qrcode.min.js"></script>
    <script src="libs/crypto-js.min.js"></script>
    <style>
        :root { --accent: #e74c3c; } /* Đổi màu sang đỏ để dễ phân biệt bản mới */
        body { background: #121212; color: #eee; font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; }
        .controls { background: #222; display: inline-flex; gap: 10px; padding: 15px; border-radius: 30px; margin-bottom: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; background: var(--accent); color: white; }
        #loader-container { display: none; margin: 20px auto; width: 80%; max-width: 400px; }
        .progress-bg { height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 10px; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.4s; }
        #qr-section { display: none; background: white; color: #333; padding: 20px; border-radius: 15px; margin-top: 20px; display: inline-block; }
        #book { display: none; margin-top: 30px; position: relative; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="file" id="pdf-input" accept=".pdf" style="display:none">
        <button class="btn" onclick="document.getElementById('pdf-input').click()">📁 Tải lên (Hỗ trợ 4G)</button>
    </div>

    <div id="loader-container">
        <div id="loader-text">Đang kết nối...</div>
        <div class="progress-bg"><div id="progress-bar"></div></div>
    </div>

    <div id="qr-section">
        <div id="qrcode"></div>
        <p><b>QUÉT ĐỂ XEM</b></p>
        <small id="share-link" style="color: blue; cursor: pointer;"></small>
    </div>

    <div id="book"></div>

<script>
    const progressBar = document.getElementById('progress-bar');
    const loaderText = document.getElementById('loader-text');
    const loaderContainer = document.getElementById('loader-container');

    document.getElementById('pdf-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        loaderContainer.style.display = 'block';
        updateProgress(10, "Mã hóa bảo mật...");

        const reader = new FileReader();
        reader.onload = async function() {
            const secretKey = CryptoJS.lib.WordArray.random(16).toString();
            const encrypted = CryptoJS.AES.encrypt(reader.result, secretKey).toString();
            
            updateProgress(30, "Đang đẩy lên Cloud...");

            // THỰC HIỆN TẢI LÊN FILE.IO
            try {
                const blob = new Blob([encrypted], { type: 'text/plain' });
                const formData = new FormData();
                formData.append('file', blob, 'project.enc');

                const response = await fetch('https://file.io', {
                    method: 'POST',
                    body: formData,
                    // Không set Content-Type thủ công để trình duyệt tự nhận diện Boundary
                });

                const resData = await response.json();

                if (resData.success) {
                    const shareURL = `${window.location.origin}${window.location.pathname}?id=${resData.key}&k=${secretKey}`;
                    updateProgress(100, "Tải lên thành công!");
                    showQR(shareURL);
                } else {
                    throw new Error("Server file.io từ chối.");
                }
            } catch (err) {
                console.error("Lỗi file.io:", err);
                updateProgress(50, "File.io lỗi, đang thử Server dự phòng...");
                // Bạn có thể thêm API dự phòng tại đây nếu cần
                alert("Mạng 4G của bạn đang chặn kết nối này. Hãy thử bật 1.1.1.1 hoặc dùng Wifi.");
            }
        };
        reader.readAsDataURL(file);
    });

    function updateProgress(p, t) {
        progressBar.style.width = p + '%';
        loaderText.innerText = t;
    }

    function showQR(url) {
        document.getElementById('qr-section').style.display = 'inline-block';
        document.getElementById('share-link').innerText = "Copy Link";
        document.getElementById('share-link').onclick = () => {
            navigator.clipboard.writeText(url);
            alert("Đã copy link!");
        };
        document.getElementById('qrcode').innerHTML = '';
        new QRCode(document.getElementById("qrcode"), { text: url, width: 160, height: 160 });
    }
</script>
</body>
</html>
